# Railway Configuration for Mantez Reels Frontend (React + Node)
# Uses the Dockerfile which builds the React app and serves via Express server.js.
# server.js reads $PORT at runtime (Railway assigns this dynamically).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Environment variables — set these in the Railway dashboard:
#
# Required (set BEFORE first deploy — needed at build time):
#   REACT_APP_BACKEND_URL = https://your-backend.up.railway.app
#
# Auto-set by Railway:
#   PORT                  = (Railway assigns this automatically)
