# Railway Configuration for Mantez Reels Frontend (React + Node)
# Docs: https://docs.railway.com/reference/config-as-code
#
# NOTE: react-snap pre-rendering is skipped on Railway (postbuild uses || echo).
# The SPA works perfectly without it — pre-rendering is an SEO bonus only.
# For full pre-rendering, deploy using the Dockerfile instead.

[build]
builder = "NIXPACKS"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_20"]

# REACT_APP_* vars must be available at build time (not just runtime).
# Set them in Railway dashboard BEFORE deploying.

[deploy]
startCommand = "node server.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Environment variables — set these in the Railway dashboard:
#
# Required (set BEFORE first deploy — needed at build time):
#   REACT_APP_BACKEND_URL = https://your-backend.up.railway.app
#
# Auto-set by Railway:
#   PORT                  = (Railway assigns this automatically)
