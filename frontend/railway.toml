# Railway Configuration for Mantez Reels Frontend (React + Node)
# Railpack auto-detects Node.js + yarn from package.json + yarn.lock
# and automatically installs dependencies and runs the build script.
#
# NOTE: react-snap pre-rendering is skipped on Railway (postbuild uses || echo).
# The SPA works perfectly without it — pre-rendering is an SEO bonus only.

[build]
builder = "RAILPACK"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Environment variables — set these in the Railway dashboard:
#
# Required (set BEFORE first deploy — needed at build time):
#   REACT_APP_BACKEND_URL = https://your-backend.up.railway.app
#
# Auto-set by Railway:
#   PORT                  = (Railway assigns this automatically)
