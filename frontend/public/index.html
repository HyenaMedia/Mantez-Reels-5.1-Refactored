            /* ── App Loading Shell ────────────────────────────────────────
               Shown instantly while the JS bundle loads.
               For pre-rendered routes this is invisible (0ms) — the
               server already sends the full page HTML.
               For SPA routes (admin/login) it shows briefly until React
               mounts and replaces #root content.
               
               Uses CSS :has() selector to auto-hide when #root has content.
               Falls back to React's useEffect for older browsers.
            ─────────────────────────────────────────────────────────────── */
            body { margin: 0; background: #080808; }

            #app-shell {
                position: fixed;
                inset: 0;
                background: #080808;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
                font-family: 'Inter', system-ui, -apple-system, sans-serif;
            }
            
            /* Hide shell when #root has pre-rendered content (prevents hydration mismatch) */
            body:has(#root > *) #app-shell {
                display: none;
            }
            .shell-inner { text-align: center; }
            .shell-ring {
                width: 64px;
                height: 64px;
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 22px;
                animation: shellPulse 2.4s ease-in-out infinite;
            }
            .shell-letter {
                color: #fff;
                font-size: 24px;
                font-weight: 700;
                letter-spacing: -1px;
                line-height: 1;
            }
            .shell-name {
                color: rgba(255,255,255,0.25);
                font-size: 10px;
                letter-spacing: 6px;
                text-transform: uppercase;
                margin: 0;
            }
            .shell-track {
                width: 80px;
                height: 1px;
                background: rgba(255,255,255,0.06);
                border-radius: 1px;
                margin: 18px auto 0;
                overflow: hidden;
            }
            .shell-bar {
                height: 100%;
                width: 40%;
                background: linear-gradient(90deg, transparent, #9333ea, transparent);
                animation: shellSweep 1.8s ease-in-out infinite;
            }
            @keyframes shellPulse {
                0%, 100% { border-color: rgba(255,255,255,0.08); }
                50%       { border-color: rgba(147,51,234,0.55); }
            }
            @keyframes shellSweep {
                0%   { transform: translateX(-100%); }
                100% { transform: translateX(300%); }
            }
        </style>
        <!-- EMERGENT_DEV_ONLY_START -->
        <script>
            // Remove Emergent badge on load
            window.addEventListener('DOMContentLoaded', function() {
                function removeBadge() {
                    const badge = document.getElementById('emergent-badge');
                    if (badge) {
                        badge.remove();
                    }
                    // Also try to find by href
                    const emergentLinks = document.querySelectorAll('a[href*="emergent.sh"]');
                    emergentLinks.forEach(link => link.remove());
                }
                
                // Run immediately
                removeBadge();
                
                // Run again after delays (in case it loads async)
                setTimeout(removeBadge, 500);
                setTimeout(removeBadge, 1000);
                setTimeout(removeBadge, 2000);
                
                // Watch for DOM changes
                const observer = new MutationObserver(removeBadge);
                observer.observe(document.body, { childList: true, subtree: true });
            });
        </script>

        <div id="root"></div>

        <!--
          Loading shell — sits OUTSIDE React's #root, positioned fixed to cover the screen.
          • Pre-rendered routes: visible for ~50-200ms (network latency), then fades out
            once React hydrates and the useEffect in App.js removes it.
          • SPA routes (admin/login): visible until React mounts (~300-600ms), same fade.
          Keeping it outside #root means React hydration never sees it.
          
          CRITICAL: No inline scripts manipulate this shell before React hydrates to avoid
          hydration mismatches. React's useEffect handles removal after mount.
        -->
        <div id="app-shell">
            <div class="shell-inner">
                <div class="shell-ring">
                    <span class="shell-letter">M</span>
                </div>
                <p class="shell-name">Mantez Reels</p>
                <div class="shell-track">
                    <div class="shell-bar"></div>
                </div>
            </div>
        </div>
        
        <!-- ULTIMATE badge removal - runs before anything else -->
        <script>
            (function() {
                'use strict';
                
                // Immediate removal function
                function nukeAllBadges() {
                    // Method 1: Remove by ID
                    const byId = document.querySelector('#emergent-badge');
                    if (byId) byId.parentNode.removeChild(byId);
                    
                    // Method 2: Remove all links to emergent
                    document.querySelectorAll('a[href*="emergent.sh"]').forEach(el => {
                        el.parentNode.removeChild(el);
                    });
                    
                    // Method 3: Find all fixed position links at bottom-right
                    document.querySelectorAll('a').forEach(el => {
                        const style = window.getComputedStyle(el);
                        const rect = el.getBoundingClientRect();
                        // If fixed position and in bottom-right area
                        if (style.position === 'fixed' && rect.bottom > window.innerHeight - 100 && rect.right > window.innerWidth - 200) {
                            el.parentNode.removeChild(el);
                        }
                    });
                    
                    // Method 4: Remove by text content
                    document.querySelectorAll('a').forEach(el => {
                        if (el.textContent && (el.textContent.includes('Emergent') || el.textContent.includes('emergent'))) {
                            const style = window.getComputedStyle(el);
                            if (style.position === 'fixed') {
                                el.parentNode.removeChild(el);
                            }
                        }
                    });
                }
                
                // Run immediately
                nukeAllBadges();
                
                // Run on every possible event
                document.addEventListener('DOMContentLoaded', nukeAllBadges);
                window.addEventListener('load', nukeAllBadges);
                
                // Run every 50ms for 10 seconds
                let counter = 0;
                const interval = setInterval(() => {
                    nukeAllBadges();
                    counter++;
                    if (counter > 200) clearInterval(interval); // Stop after 10 seconds
                }, 50);
                
                // MutationObserver to catch new additions
                const observer = new MutationObserver((mutations) => {
                    mutations.forEach((mutation) => {
                        mutation.addedNodes.forEach((node) => {
                            if (node.nodeType === 1) { // Element node
                                // Check if it's the badge or contains it
                                if (node.id === 'emergent-badge' || 
                                    (node.tagName === 'A' && node.href && node.href.includes('emergent.sh'))) {
                                    node.parentNode.removeChild(node);
                                }
                                // Check child elements
                                if (node.querySelector) {
                                    const badges = node.querySelectorAll('#emergent-badge, a[href*="emergent.sh"]');
                                    badges.forEach(badge => badge.parentNode.removeChild(badge));
                                }
                            }
                        });
                    });
                });
                
                // Start observing
                observer.observe(document.documentElement, {
                    childList: true,
                    subtree: true
                });
            })();
        </script>

        <!-- Scroll to Top Button - Pure JavaScript -->
        <script>
            (function() {
                // Create button element
                const button = document.createElement('button');
                button.setAttribute('aria-label', 'Scroll to top');
                button.id = 'scroll-to-top-btn';
                button.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>';
                
                // Style the button
                button.style.cssText = `
                    position: fixed !important;
                    bottom: 32px !important;
                    right: 32px !important;
                    width: 56px !important;
                    height: 56px !important;
                    border-radius: 50% !important;
                    background-color: #9333ea !important;
                    color: white !important;
                    border: none !important;
                    cursor: pointer !important;
                    display: none !important;
                    align-items: center !important;
                    justify-content: center !important;
                    box-shadow: 0 10px 40px rgba(147, 51, 234, 0.4) !important;
                    transition: all 0.3s ease !important;
                    z-index: 999999 !important;
                    pointer-events: auto !important;
                    opacity: 0 !important;
                `;
                
                // Add to body
                document.body.appendChild(button);
                
                // Show/hide based on scroll
                let isVisible = false;
                window.addEventListener('scroll', function() {
                    const scrollPercentage = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
                    
                    if (scrollPercentage > 60 && !isVisible) {
                        button.style.display = 'flex';
                        setTimeout(() => {
                            button.style.opacity = '1';
                        }, 10);
                        isVisible = true;
                    } else if (scrollPercentage <= 60 && isVisible) {
                        button.style.opacity = '0';
                        setTimeout(() => {
                            button.style.display = 'none';
                        }, 300);
                        isVisible = false;
                    }
                });
                
                // Hover effect
                button.addEventListener('mouseenter', function() {
                    this.style.transform = 'scale(1.1)';
                    this.style.backgroundColor = '#7e22ce';
                });
                
                button.addEventListener('mouseleave', function() {
                    this.style.transform = 'scale(1)';
                    this.style.backgroundColor = '#9333ea';
                });
                
                // Click handler
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('Scroll to top clicked!');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                
                console.log('Scroll to top button initialized');
            })();
        </script>
