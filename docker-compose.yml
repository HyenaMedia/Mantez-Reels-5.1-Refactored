# Docker Compose - Run Full Stack Locally
# Usage: docker compose up --build

services:
  # MongoDB Database (using 4.4-focal for broader CPU compatibility)
  mongodb:
    image: mongo:4.4-focal
    container_name: portfolio-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=portfolio_db

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=portfolio_db
      - JWT_SECRET_KEY=local-dev-secret-change-in-production-1234567890
      - CORS_ORIGINS=http://localhost:3000,http://localhost:80,http://localhost
    depends_on:
      - mongodb

  # Frontend (React served by Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty BACKEND_URL for local dev - nginx will proxy to backend
        - REACT_APP_BACKEND_URL=
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
