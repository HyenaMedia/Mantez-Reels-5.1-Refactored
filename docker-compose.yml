# Docker Compose - Run Full Stack Locally
# Usage: docker compose up --build

services:
  # MongoDB Database (using 4.4-focal for broader CPU compatibility)
  mongodb:
    image: mongo:4.4-focal
    container_name: portfolio-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=portfolio_db

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=portfolio_db
      - JWT_SECRET_KEY=local-dev-secret-change-in-production-1234567890
      - CORS_ORIGINS=http://localhost:3000,http://localhost:80,http://localhost
      - PORT=8001
    depends_on:
      - mongodb

  # Frontend (React served by Express server.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Backend URL for API proxy — empty means server.js proxies to localhost:8001
        - REACT_APP_BACKEND_URL=
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - PORT=3000
    depends_on:
      - backend

volumes:
  mongodb_data:
