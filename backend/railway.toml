# Railway Configuration for Mantez Reels Backend (FastAPI)
# Uses the Dockerfile which handles Python + pip install + uvicorn.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Environment variables — set these in the Railway dashboard:
#
# Required:
#   MONGO_URL          = mongodb+srv://...  (from MongoDB Atlas)
#   JWT_SECRET_KEY     = (auto-generate a strong secret)
#   CORS_ORIGINS       = https://your-frontend.up.railway.app
#   DB_NAME            = mantezreels
#
# Optional:
#   MEDIA_DIR          = /tmp/backend/media
#   TRUSTED_PROXY_COUNT = 1
#   SENTRY_DSN         = (from sentry.io)
