# Railway Configuration for Mantez Reels Backend (FastAPI)
# Railpack auto-detects Python from requirements.txt + server.py
# and automatically installs pip + dependencies.
# Forces RAILPACK builder to skip the Dockerfile (which is for Docker Compose).

[build]
builder = "RAILPACK"

[deploy]
startCommand = "uvicorn server:app --host 0.0.0.0 --port ${PORT:-8001}"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Environment variables — set these in the Railway dashboard:
#
# Required:
#   MONGO_URL          = mongodb+srv://...  (from MongoDB Atlas)
#   JWT_SECRET_KEY     = (auto-generate a strong secret)
#   CORS_ORIGINS       = https://your-frontend.up.railway.app
#   DB_NAME            = mantezreels
#
# Optional:
#   RAILPACK_PYTHON_VERSION = 3.12  (defaults to 3.13)
#   MEDIA_DIR          = /tmp/backend/media
#   TRUSTED_PROXY_COUNT = 1
#   SENTRY_DSN         = (from sentry.io)
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET_NAME
