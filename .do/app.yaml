# DigitalOcean App Platform Configuration
name: portfolio-admin
region: nyc

services:
  - name: backend
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    http_port: 8001
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
    envs:
      - key: MONGO_URL
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DB_NAME
        scope: RUN_TIME
        value: portfolio_db
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: ${APP_URL}

  - name: frontend
    dockerfile_path: frontend/Dockerfile
    source_dir: frontend
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    build_args:
      - key: BACKEND_HOST
        value: backend
    envs:
      - key: REACT_APP_BACKEND_URL
        scope: BUILD_TIME
        value: ${backend.PUBLIC_URL}
